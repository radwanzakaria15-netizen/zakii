<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Zaki - حساب المعدل</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(-45deg,#1b1b2f,#4e54c8,#00c6ff,#0072ff);
  background-size:400% 400%;
  animation:gradient 20s ease infinite;
  color:white;
  margin:0;
}

@keyframes gradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:20px;
  width:220px;
}

.card input{
  width:40%;
  padding:8px;
  margin:5px;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#00ffff;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.result{
  margin-top:20px;
  font-size:25px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
  <h1>Zaki</h1>
  <h2>📊 موقع حساب المعدل</h2>

  <h2>السداسي الأول</h2>

  <form id="semesterForm">

    <div class="cards">

      <div class="card">
        <h3>النحو</h3>
        <input type="number" name="tdnaho" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examnaho" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

      <div class="card">
        <h3>الصرف</h3>
        <input type="number" name="tdsrf" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examsrf" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

      <div class="card">
        <h3>الأدب</h3>
        <input type="number" name="tdadab" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examadab" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

      <div class="card">
        <h3>الرياضيات</h3>
        <input type="number" name="tdm" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examm" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

      <div class="card">
        <h3>الفيزياء</h3>
        <input type="number" name="tdf" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examf" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

      <div class="card">
        <h3>الكيمياء</h3>
        <input type="number" name="tdc" placeholder="TD" min="0" max="20" step="0.01">
        <input type="number" name="examc" placeholder="Exam" min="0" max="20" step="0.01">
      </div>

    </div>

    <br>
    <button type="button" onclick="calculateAverage()">احسب المعدل</button>

  </form>

  <div class="result" id="result"></div>
</div>

<script>
function calculateAverage(){
  const form = document.getElementById('semesterForm');
  const data = Object.fromEntries(new FormData(form));
  let subjects = ["tdnaho","examnaho","tdsrf","examsrf","tdadab","examadab","tdm","examm","tdf","examf","tdc","examc"];
  let total = 0;

  for(let i=0;i<subjects.length;i+=2){
    let td = parseFloat(data[subjects[i]]) || 0;
    let exam = parseFloat(data[subjects[i+1]]) || 0;
    total += (td*0.33 + exam*0.67);
  }

  let average = (total/6).toFixed(2);
  let msg = average >= 10 ? "✅ مبروك نجحت" : "❌ حاول أكثر";

  document.getElementById('result').innerHTML = `🔥 معدلك هو ${average}<br>${msg}`;
}
</script>

</html>
