<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Zaki</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body{
font-family:'Cairo',sans-serif;
margin:0;
background:linear-gradient(-45deg,#1b1b2f,#4e54c8,#00c6ff,#0072ff);
background-size:400% 400%;
animation:gradientMove 25s ease infinite;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:900px;
width:95%;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:25px;
margin-top:40px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
width:230px;
text-align:center;
}

.card input{
width:40%;
padding:10px;
margin:5px;
border:none;
border-radius:10px;
text-align:center;
background:rgba(255,255,255,0.15);
color:white;
}

button{
padding:12px 25px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#00ffff,#0072ff);
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:25px;
font-size:26px;
text-align:center;
}
</style>
</head>
<body>

<h1>Zaki</h1>
<h2>موقع حساب المعدل</h2>

<div class="container">

<h2>السداسي الأول</h2>

<form id="gradeForm">

<div class="cards">

<div class="card">
<h3>النحو</h3>
<input type="number" name="tdnaho" placeholder="TD">
<input type="number" name="examnaho" placeholder="Exam">
</div>

<div class="card">
<h3>الصرف</h3>
<input type="number" name="tdsrf" placeholder="TD">
<input type="number" name="examsrf" placeholder="Exam">
</div>

<div class="card">
<h3>الأدب</h3>
<input type="number" name="tdadab" placeholder="TD">
<input type="number" name="examadab" placeholder="Exam">
</div>

<div class="card">
<h3>الرياضيات</h3>
<input type="number" name="tdm" placeholder="TD">
<input type="number" name="examm" placeholder="Exam">
</div>

<div class="card">
<h3>الفيزياء</h3>
<input type="number" name="tdf" placeholder="TD">
<input type="number" name="examf" placeholder="Exam">
</div>

<div class="card">
<h3>الكيمياء</h3>
<input type="number" name="tdc" placeholder="TD">
<input type="number" name="examc" placeholder="Exam">
</div>

</div>

<br>
<button type="button" onclick="calculate()">احسب المعدل</button>

</form>

<div class="result" id="result"></div>

</div>

<script>
function calculate(){
  const form = document.getElementById('gradeForm');
  const data = Object.fromEntries(new FormData(form));
  let keys = ["tdnaho","examnaho","tdsrf","examsrf","tdadab","examadab","tdm","examm","tdf","examf","tdc","examc"];
  let sum = 0;

  for(let i=0;i<keys.length;i+=2){
    let td = parseFloat(data[keys[i]]) || 0;
    let exam = parseFloat(data[keys[i+1]]) || 0;
    sum += (td*0.33 + exam*0.67)*2;
  }

  let average = (sum/12).toFixed(2);
  let msg = average >= 10 ? "مبروك نجحت" : "حاول أكثر";

  document.getElementById('result').innerHTML = `معدلك هو ${average}<br>${msg}`;
}
</script>

</body>
</html>
